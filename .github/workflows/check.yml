name: Repo Health Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make check.sh executable
        run: chmod +x check.sh

      - name: Run health check script
        run: ./check.sh